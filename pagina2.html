<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Duelo Estelar - Battle Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Hanken+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="bg-overlay"></div>

    <!-- PLACAR FIXO EM CIMA -->
    <div class="score-board">
        <div class="score-item">
            <span class="score-label">VOCÊ</span>
            <span class="score-value" id="player-score">0</span>
        </div>
        <div class="score-item">
            <span class="score-label">IA</span>
            <span class="score-value" id="ai-score">0</span>
        </div>
    </div>

    <div class="game-wrapper">
        <main class="main-container">
            <section class="opponent-area">
                <div class="player-info">
                    <span class="player-name">Adversário</span>
                </div>
                <div class="opponent-hand" id="opponent-hand"></div>
            </section>

            <section class="battlefield float-animation">
                <div class="draw-pile" id="draw-pile">
                    <div class="draw-pile-glow"></div>
                    <div class="draw-pile-card">
                        <img src="assets/verso.png" alt="Monte">
                        <span class="draw-text" id="draw-text">DRAW (20)</span>
                    </div>
                    <div class="draw-pile-shadow"></div>
                </div>
                <div class="discard-pile">
                    <div class="discard-card" id="discard-card">
                        <img src="assets/verso.png" alt="Descarte" class="discard-img" id="discard-img">
                        <span class="discard-count" id="discard-count">0</span>
                    </div>
                </div>
            </section>

            <section class="player-area">
                <div class="player-info">
                    <span class="player-name">Você</span>
                </div>
                <div class="player-hand" id="player-hand"></div>
            </section>
        </main>
    </div>
</body>
</html>
